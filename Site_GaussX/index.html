<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GaussX</title>
  <meta name="description" content="Plataforma acadêmica do GaussX para encontros, materiais e organização dos estudos em Física e Matemática." />
  <link rel="icon" type="image/svg+xml" href="assets/logo-gaussx.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script>document.documentElement.classList.add('js');</script>
  <noscript>
    <style>
      .hero, .hero * , .meeting-card { opacity: 1 !important; transform: none !important; filter: none !important; }
    </style>
  </noscript>
  <script src="script.js" defer></script>
</head>
<body>
  <div class="top-progress" aria-hidden="true"><span></span></div>
  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>
  <div class="bg-noise"></div>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>
  <div class="mouse-light" aria-hidden="true"></div>

  <main class="page">
    <header class="hero" id="hero">
      <div class="hero-badge reveal reveal-fade">Física &amp; Matemática</div>

      <div class="logo-shell reveal reveal-hero" aria-hidden="true">
        <span class="logo-ring logo-ring-1"></span>
        <span class="logo-ring logo-ring-2"></span>
        <span class="logo-flare"></span>
        <img src="assets/logo-gaussx.svg" alt="Logo GaussX" class="logo" />
      </div>

      <h1 class="hero-title reveal reveal-title" aria-label="GaussX">
        <span class="hero-word">GAUSSX</span>
      </h1>

      <p class="subtitle reveal reveal-fade reveal-delay-1">
        Plataforma acadêmica para encontros, materiais e organização dos estudos.
      </p>

      <div class="hero-scroll reveal reveal-fade reveal-delay-2" aria-hidden="true">
        <span></span>
      </div>
    </header>

    <section class="meetings" id="meeting-list" aria-label="Encontros do GaussX"></section>
  </main>
</body>
</html>
