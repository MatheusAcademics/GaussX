<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GaussX</title>
  <meta name="description" content="GaussX - Clube de Interesse de Física e Matemática" />
  <link rel="icon" type="image/svg+xml" href="assets/logo-gaussx.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <script>document.documentElement.classList.add('js');</script>
  <script src="script.js" defer></script>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-noise"></div>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <main class="page">
    <section class="hero" id="top">
      <div class="hero-kicker reveal reveal-fade">Clube de Interesse</div>
      <div class="hero-stage">
        <div class="logo-shell reveal reveal-hero">
          <span class="logo-ring"></span>
          <img src="assets/logo-gaussx.svg" alt="Logo GaussX" class="logo" />
        </div>
      </div>
      <h1 class="hero-title reveal reveal-title">GAUSSX</h1>
      <p class="subtitle reveal reveal-subtitle">Física e Matemática em uma plataforma feita para encontros, materiais e aprofundamento acadêmico.</p>
    </section>

    <section class="meetings" id="meeting-list"></section>
  </main>
</body>
</html>
