<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GaussX</title>
  <meta name="description" content="Plataforma acadêmica do GaussX para encontros, materiais e organização dos estudos em Física e Matemática." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <div class="bg-ambient bg-ambient-1"></div>
  <div class="bg-ambient bg-ambient-2"></div>
  <div class="bg-grid"></div>

  <main class="page">
    <section class="hero">
      <div class="hero-logo-wrap" aria-hidden="true">
        <div class="hero-logo-glow"></div>
        <img src="assets/logo-gaussx.svg" alt="Logo do GaussX" class="hero-logo" />
      </div>
      <h1 class="hero-title">GAUSSX</h1>
      <p class="hero-subtitle">Física e Matemática</p>
    </section>

    <section id="meeting-list" class="meetings" aria-label="Lista de encontros"></section>
  </main>
</body>
</html>
